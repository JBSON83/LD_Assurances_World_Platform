name: Deploy to Hostinger VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            echo "🚀 Démarrage du déploiement sur Hostinger..."
            
            # Installation de Docker si absent
            if ! [ -x "$(command -v docker)" ]; then
              echo "📦 Installation de Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
            fi

            # Gestion du dépôt Git
            PROJECT_DIR="LD_Assurances_World_Platform"
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "📥 Clonage du dépôt..."
              git clone https://github.com/JBSON83/LD_Assurances_World_Platform.git
              cd "$PROJECT_DIR"
            else
              echo "🔄 Mise à jour du code (git pull)..."
              cd "$PROJECT_DIR"
              git fetch --all
              git reset --hard origin/main
            fi
            
            # Lancement Docker
            echo "🐳 Reconstruction et lancement des containers..."
            sudo docker-compose down || true
            sudo docker-compose up -d --build
            
            echo "✅ Déploiement terminé !"

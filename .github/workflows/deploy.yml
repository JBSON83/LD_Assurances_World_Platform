name: Deploy to Hostinger VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 20m
          debug: true
          script: |
            echo "🚀 Démarrage du déploiement sur Hostinger VPS $(hostname)..."
            
            # Libération des ports 80 et 443
            echo "🧹 Libération des ports 80 et 443..."
            sudo systemctl stop nginx apache2 2>/dev/null || true
            sudo systemctl disable nginx apache2 2>/dev/null || true
            
            # Arrêt des containers Docker existants
            echo "🐳 Arrêt des containers Docker existants..."
            docker ps -q --filter "publish=80" | xargs -r docker stop || true
            docker ps -q --filter "publish=443" | xargs -r docker stop || true
            sudo fuser -k 80/tcp 2>/dev/null || true
            sudo fuser -k 443/tcp 2>/dev/null || true
            
            # Ouverture des ports dans le firewall
            echo "🛡️ Ouverture des ports 80, 443 et 8001..."
            sudo ufw allow 80/tcp || true
            sudo ufw allow 443/tcp || true
            sudo ufw allow 8001/tcp || true
            
            sleep 2
            
            # Vérification et installation Docker
            if ! command -v docker &>/dev/null; then
              echo "📦 Installation Docker..."
              curl -fsSL https://get.docker.com | sh
            fi
            
            if ! command -v docker-compose &>/dev/null; then
              echo "📦 Installation docker-compose..."
              apt-get update && apt-get install -y docker-compose || pip install docker-compose
            fi

            # Gestion du dépôt Git
            PROJECT_DIR="$HOME/LD_Assurances_World_Platform"
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "📥 Clonage du dépôt..."
              git clone https://github.com/JBSON83/LD_Assurances_World_Platform.git "$PROJECT_DIR"
            else
              echo "🔄 Mise à jour du code..."
              git -C "$PROJECT_DIR" fetch --all
              git -C "$PROJECT_DIR" reset --hard origin/main
            fi
            
            cd "$PROJECT_DIR"

            # Fix permissions pour SQLite
            echo "🔑 Fix des permissions SQLite..."
            mkdir -p core
            rm -rf core/knowledge_vault.db
            touch core/knowledge_vault.db
            chmod -R 777 core/

            # ============================
            # SSL Let's Encrypt Setup
            # ============================
            echo "🔒 Configuration SSL Let's Encrypt..."
            DOMAIN="jemassurance.online"
            CERT_PATH="/etc/letsencrypt/live/$DOMAIN"
            SSL_OK=false

            # Installer Certbot si absent
            if ! command -v certbot &>/dev/null; then
              echo "📦 Installation Certbot..."
              sudo apt-get update -qq
              sudo apt-get install -y certbot
            fi

            # Créer le dossier webroot
            sudo mkdir -p /var/www/certbot

            if [ ! -d "$CERT_PATH" ]; then
              echo "🆕 Génération du certificat SSL (première fois)..."
              if sudo certbot certonly --standalone \
                -d "$DOMAIN" \
                -d "www.$DOMAIN" \
                --non-interactive \
                --agree-tos \
                --email admin@jemassurance.online \
                --no-eff-email; then
                echo "✅ Certificat SSL généré avec succès !"
                SSL_OK=true
              else
                echo "⚠️ SSL échoué - Le site restera en HTTP"
                SSL_OK=false
              fi
            else
              echo "🔄 Renouvellement SSL si nécessaire..."
              sudo certbot renew --quiet --non-interactive || true
              SSL_OK=true
            fi

            # Si SSL a échoué, revenir au nginx.conf HTTP simple
            if [ "$SSL_OK" = false ]; then
              echo "📋 Restauration nginx.conf HTTP (fallback)..."
              cp nginx.conf.backup_before_ssl nginx.conf || true
              cp docker-compose.yml.backup_before_ssl docker-compose.yml || true
            fi

            # Nettoyage Docker
            echo "🧼 Nettoyage système Docker..."
            docker system prune -af --volumes || true

            # Lancement Docker Compose
            echo "🐳 Reconstruction et lancement des containers..."
            docker-compose down --remove-orphans || true
            if docker-compose up -d --build; then
              echo "✅ Containers lancés. Vérification de l'état..."
              sleep 5
              docker-compose ps
              if [ "$SSL_OK" = true ]; then
                echo "🎉 Déploiement terminé ! Site dispo sur https://jemassurance.online"
              else
                echo "🌐 Déploiement terminé en HTTP ! Site dispo sur http://jemassurance.online"
              fi
              docker-compose logs --tail=20 backend
            else
              echo "❌ ÉCHEC du lancement Docker Compose."
              docker-compose logs --tail=50
              exit 1
            fi

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assurance Voyage | LD Assurances Cameroon</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #06b6d4;
            --secondary: #fbbf24;
            --dark: #0b1121;
            --glass: rgba(15, 23, 42, 0.7);
            --text: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .badge {
            background: #06b6d433;
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .price-box {
            font-size: 3rem;
            font-weight: 800;
            color: var(--secondary);
            margin: 2rem 0;
        }

        .cta-btn {
            display: inline-block;
            padding: 1.2rem 3rem;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 800;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="../index.html"
            style="color: #94a3b8; text-decoration: none; display: inline-block; margin-bottom: 1rem;">← Retour</a>
        <div class="glass-card">
            <span class="badge">Agréé Ambassades / Schengen</span>
            <h1>Voyagez l'esprit tranquille</h1>
            <p style="color: #94a3b8;">Certificat instantané pour vos demandes de visa. Assistance 24/7 dans le monde
                entier.</p>
            <div class="price-box">Dès 10,000 F</div>
            <p>Frais médicaux, rapatriement, perte de bagages et assistance juridique.</p>
            <a href="#" class="cta-btn">Calculer mon Assurance</a>
        </div>
    </div>
</body>

</html>

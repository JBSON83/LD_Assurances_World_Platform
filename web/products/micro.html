<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Premium | LD Assurances</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../titch.css">
    <style>
        body {
            padding: 4rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .momo-card {
            max-width: 600px;
            width: 100%;
            padding: 4rem;
            text-align: center;
            border-color: #ec489933;
        }

        .momo-logo {
            width: 80px;
            margin-bottom: 2rem;
        }

        .price-badge {
            font-size: 4rem;
            font-weight: 800;
            color: var(--secondary);
            margin: 2rem 0;
        }
    </style>
</head>

<body class="product-page">
    <div class="product-header animate-fade-in">
        <a href="../index.html"
            style="color: var(--text-dim); text-decoration: none; margin-bottom: 2rem; display: inline-block;">←
            Retour</a>
        <h1 class="text-gradient" style="background: linear-gradient(to right, #fff, #ec4899); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Micro Protection</h1>
        <p>La sécurité pour tous, à partir de 100 FCFA par jour.</p>
    </div>

    <div class="animate-fade-in" style="max-width: 600px; margin: 0 auto; padding: 0 1.5rem;">
        <div class="titch-glass" style="padding: 3rem; text-align: center; border-color: rgba(236, 72, 153, 0.2);">
            <div style="font-size: 4rem; font-weight: 800; color: #ec4899; margin-bottom: 1.5rem;">
                100 F<span style="font-size: 1.2rem; color: var(--text-dim);"> / jour</span>
            </div>

            <div style="background: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 20px; margin-bottom: 2.5rem; border: 1px solid rgba(236, 72, 153, 0.1);">
                <p style="font-weight: 600; margin-bottom: 0.5rem; color: white;">Couverture Hospitalisation & Prévoyance</p>
                <p style="font-size: 0.9rem; color: var(--text-dim);">Souscription et paiement 100% Mobile Money.</p>
            </div>

            <button class="titch-btn pulse" style="background: #ec4899; color: white; width: 100%; border: none;">Payer via MoMo / Orange</button>
        </div>
    </div>
</body>

</html>

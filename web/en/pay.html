<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | Jemassurance</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../titch.css">
    <script src="../pixel.js"></script>
    <style>
        body {
            padding: 4rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .payment-container {
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 3rem;
        }

        .summary {
            padding: 2.5rem;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 20px;
        }

        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .method-btn {
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .method-btn:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .card-form {
            margin-top: 2rem;
            display: none;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div style="position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 1.5rem; z-index: 1000;">
        <div class="lang-switcher">
            <a href="../pay.html" class="lang-btn">FR</a>
            <a href="#" class="lang-btn active">EN</a>
        </div>
        <a href="index.html" class="logo-link">
            <img src="../assets/logo.svg" alt="Jemassurance Logo" class="logo-img" style="height: 40px;">
        </a>
    </div>
    <div class="payment-container animate-fade-in">
        <div class="checkout titch-glass" style="padding: 3rem;">
            <h1 class="text-gradient">Finalize Your Protection</h1>
            <p style="color: var(--text-dim);">All transactions are secure and encrypted.</p>

            <div class="payment-methods">
                <div class="method-btn" onclick="selectMethod('momo')">
                    <div style="width: 40px; height: 40px; background: #ffcc00; border-radius: 8px;"></div>
                    <span>MTN MoMo / Orange Money</span>
                </div>
                <div class="method-btn" onclick="selectMethod('card')">
                    <div style="width: 40px; height: 40px; background: #3b82f6; border-radius: 8px;"></div>
                    <span>Bank Card (VISA / Mastercard)</span>
                </div>
            </div>

            <div id="card-form" class="card-form">
                <input type="text" placeholder="Card Number">
                <div style="display: flex; gap: 1rem;">
                    <input type="text" placeholder="MM/YY">
                    <input type="text" placeholder="CVC">
                </div>
                <button onclick="processPayment()" class="titch-btn" style="width: 100%;">Pay Now</button>
            </div>

            <div id="momo-form" class="card-form">
                <input type="text" placeholder="Phone Number (6xx xxx xxx)">
                <button onclick="processPayment()" class="titch-btn"
                    style="width: 100%; background: var(--secondary); color: black;">Pay with Mobile Money</button>
            </div>
        </div>

        <div class="summary titch-glass">
            <h3>Summary</h3>
            <div style="margin-top: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span>Premium Auto Insurance</span>
                    <span id="p-amount">85,000 F</span>
                </div>
                <div style="display: flex; justify-content: space-between; color: #10b981;">
                    <span>"First Year" Promotion</span>
                    <span>-5,000 F</span>
                </div>
                <a href="../index.html" class="logo-link" style="display: block; margin-top: 1rem;">
                    <img src="../assets/logo.svg" alt="Jemassurance Logo" class="logo-img" style="height: 35px;">
                </a>
            </div>
            <div
                style="margin-top: 2rem; display: flex; justify-content: space-between; font-weight: 800; font-size: 1.5rem;">
                <span>Total</span>
                <span id="final-total">80,000 F</span>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-dim); margin-top: 2rem;">By paying, you accept our general terms and conditions.</p>
        </div>
    </div>

    <script>
        function selectMethod(m) {
            document.querySelectorAll('.card-form').forEach(f => f.style.display = 'none');
            document.getElementById(`${m}-form`).style.display = 'block';
            LD_Pixel.emit("InitiateCheckout", { method: m });
        }

        function processPayment() {
            LD_Pixel.trackPurchase(80000, "XAF", "Premium Auto Insurance");
            alert("Secure processing in progress... (API Simulation)");
            window.location.href = "thanks.html";
        }
    </script>
</body>

</html>

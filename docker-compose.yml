version: '3.8'

services:
  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      - PAYMENT_API_KEY=${PAYMENT_API_KEY}
      - FLW_SECRET_KEY=${FLW_SECRET_KEY}
    restart: always

  frontend:
    image: nginx:alpine
    volumes:
      - ./web:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "9000:80"
    depends_on:
      - backend
    restart: always

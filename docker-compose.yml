version: '3.8'

services:
  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      - PAYMENT_API_KEY=${PAYMENT_API_KEY}
      - FLW_SECRET_KEY=${FLW_SECRET_KEY}
    restart: always

  frontend:
    image: nginx:alpine
    volumes:
      - ./web:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: always

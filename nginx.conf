# Redirection HTTP → HTTPS + challenge Let's Encrypt
server {
    listen 80;
    server_name jemassurance.online www.jemassurance.online;

    # Dossier pour la vérification Let's Encrypt (webroot futur)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Serveur HTTPS principal
server {
    listen 443 ssl;
    server_name jemassurance.online www.jemassurance.online;

    ssl_certificate /etc/letsencrypt/live/jemassurance.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jemassurance.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header X-Debug-Status "Frontend-HTTPS-OK";
    }

    location /api/ {
        proxy_pass http://backend:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Debug-Status "API-Proxy-HTTPS-OK";
    }
}
